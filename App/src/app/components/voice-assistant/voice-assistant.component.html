<div class="voice-assistant-container">
  <h1>🎤 Voice Assistant</h1>

  <div class="error-message" *ngIf="error">
    <p>{{ error }}</p>
  </div>

  <div class="model-status">
    <span *ngIf="isModelLoaded$ | async" class="status-indicator loaded">
      ✓ Model Loaded
    </span>
    <span *ngIf="!(isModelLoaded$ | async)" class="status-indicator loading">
      ⟳ Loading Model...
    </span>
  </div>

  <div class="controls">
    <button 
      (click)="startListening()" 
      [disabled]="(isRecording$ | async) || isProcessing"
      class="btn btn-primary"
      aria-label="Start listening">
      🎤 Start Listening
    </button>
    <button 
      (click)="stopListening()" 
      [disabled]="!(isRecording$ | async)"
      class="btn btn-secondary"
      aria-label="Stop listening">
      ⏹️ Stop Listening
    </button>
    <button 
      (click)="stopSpeaking()" 
      [disabled]="!(isSpeaking$ | async)"
      class="btn btn-secondary"
      aria-label="Stop speaking">
      🔇 Mute
    </button>
  </div>

  <div class="status">
    <p *ngIf="isRecording$ | async" class="recording">
      <span class="recording-dot"></span>
      Recording...
    </p>
    <p *ngIf="isProcessing" class="processing">
      <span class="spinner"></span>
      Processing audio...
    </p>
    <p *ngIf="!(isRecording$ | async) && !isProcessing" class="idle">
      Ready to listen
    </p>
  </div>

  <div class="visualization">
    <canvas 
      #canvas 
      width="400" 
      height="100">
    </canvas>
  </div>

  <div class="results" *ngIf="intent || responseText">
    <div class="intent-result" *ngIf="intent">
      <h3>Intent Detected</h3>
      <p class="intent-value">{{ intent }}</p>
      <p class="confidence">Confidence: {{ (confidence * 100).toFixed(1) }}%</p>
    </div>

    <div class="response-result" *ngIf="responseText">
      <h3>Response</h3>
      <p class="response-text">{{ responseText }}</p>
      <p *ngIf="isSpeaking$ | async" class="speaking-indicator">
        🔊 Speaking...
      </p>
    </div>
  </div>

  <div class="transcript">
    <h3>Transcript</h3>
    <p *ngIf="transcript$ | async as transcript; else noTranscript">
      {{ transcript }}
    </p>
    <ng-template #noTranscript>
      <p>(no transcript yet)</p>
    </ng-template>
  </div>
</div>
