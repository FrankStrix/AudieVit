services:
  ollama:
    image: ollama/ollama:latest
    container_name: audievit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: audievit-api
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:latest
      - WHISPER_MODEL=base
    depends_on:
      - ollama
    volumes:
      - ../storage:/app/storage

volumes:
  ollama_data:
